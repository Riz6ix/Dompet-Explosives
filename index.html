    <style>
      /* 
      ╔════════════════════════════════════════════════════════════════════╗
      ║ 🎨 GLOBAL STYLES & LAYOUT RESET                                    ║
      ╚════════════════════════════════════════════════════════════════════╝
      */
      body,
      html {
        height: auto !important;
        overflow-x: hidden;
        overflow-y: auto;
      }

      /* 
      ╔════════════════════════════════════════════════════════════════════╗
      ║ 🌀 LOADING SCREEN ANIMATIONS (The Calm Before Storm)               ║
      ╚════════════════════════════════════════════════════════════════════╝
      */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #064e3b 0%, #581c87 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        z-index: 9999;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* 
      ╔════════════════════════════════════════════════════════════════════╗
      ║ 🌌 DYNAMIC BACKGROUND SYSTEM (Forest & Fire Theme)                 ║
      ╚════════════════════════════════════════════════════════════════════╝
      */
            /* 🛠️ INDUSTRIAL CLEAN ANIMATIONS */
            @keyframes shake {
              0%, 100% { transform: translateX(0); }
              25% { transform: translateX(-8px); }
              50% { transform: translateX(8px); }
              75% { transform: translateX(-4px); }
            }
      
            .animate-shake {
              animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            }
      
            /* Muted Forest & Fire Background */
            @keyframes gradientShift {
              0%, 100% {
                background: linear-gradient(180deg, #022c22 0%, #052e16 80%, #451a03 100%);
              }
              50% {
                background: linear-gradient(180deg, #052e16 0%, #022c22 80%, #7c2d12 100%);
              }
            }
      
            @keyframes floatingBubbles {
              0%, 100% { transform: translateY(0px); opacity: 0.05; }
              50% { transform: translateY(-15px); opacity: 0.1; }
            }
      
            /* Background dinamis untuk body */
            .dynamic-bg {
              background: #022c22;
              background: linear-gradient(180deg, #022c22 0%, #052e16 80%, #451a03 100%);
              background-size: 100% 100%;
              animation: gradientShift 12s ease-in-out infinite;
              position: relative;
              overflow: hidden;
            }

      .dynamic-bg::before {
        content: "";
        pointer-events: none;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
            circle at 20% 80%,
            rgba(120, 119, 198, 0.3) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(255, 119, 198, 0.3) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 40% 40%,
            rgba(120, 219, 255, 0.3) 0%,
            transparent 50%
          );
        animation: floatingBubbles 12s ease-in-out linear;
      }

      .dynamic-bg::after {
        content: "";
        pointer-events: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 200%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.1) 25%,
          rgba(255, 255, 255, 0.2) 50%,
          rgba(255, 255, 255, 0.1) 75%,
          transparent 100%
        );
        animation: wave 8s linear infinite;
      }

      /* Header dengan efek glass */
      .glass-header {
        background: rgba(255, 255, 255, 0.1);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      }

      /* Card dengan efek glass */
      .glass-card {
        background: rgba(255, 255, 255, 0.9);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
      }
      /* Icons as CSS - fallback for lucide-react */
      .icon {
        width: 1.2em;
        height: 1.2em;
        display: inline-block;
        vertical-align: middle;
      }

      /* Tab animations */
      .tab-container {
        position: relative;
        overflow: hidden;
      }

      .tab-indicator {
        position: absolute;
        bottom: 0;
        height: 2px;
        background: linear-gradient(90deg, #3b82f6, #1d4ed8);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 1px;
      }

      .tab-button {
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .tab-button::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(59, 130, 246, 0.1),
          transparent
        );
        transition: left 0.5s ease;
      }

      .tab-button:hover::before {
        left: 100%;
      }

      /* Floating Action Button */
      .fab {
        position: fixed;
        bottom: 24px;
        right: 24px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        color: rgb(14, 13, 13);
        border: none;
        box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        z-index: 1000;
        animation: fabPulse 4s ease-in-out infinite;
      }

      .fab:hover {
        transform: scale(1.1);
        box-shadow: 0 12px 32px rgba(59, 130, 246, 0.6);
      }

      .fab:active {
        transform: scale(0.95);
      }

      @keyframes fabPulse {
        0%,
        100% {
          box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4),
            0 0 0 0 rgba(59, 130, 246, 0.4);
        }
        50% {
          box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4),
            0 0 0 20px rgba(59, 130, 246, 0);
        }
      }
      /* ========================================= */
      /* TOAST ANIMATIONS - PROFESSIONAL & SMOOTH */
      /* ========================================= */

      /* Slide in from right - smooth entrance */
      @keyframes toastSlideIn {
        0% {
          transform: translateX(120%) translateY(-10px);
          opacity: 0;
        }
        60% {
          transform: translateX(-5%) translateY(0);
          opacity: 1;
        }
        80% {
          transform: translateX(3%) translateY(0);
        }
        100% {
          transform: translateX(0) translateY(0);
          opacity: 1;
        }
      }

      /* Slide out to right - smooth exit */
      @keyframes toastSlideOut {
        0% {
          transform: translateX(0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translateX(120%) scale(0.9);
          opacity: 0;
        }
      }

      /* Gentle bounce for LUNAS celebration */
      @keyframes toastBounce {
        0%,
        100% {
          transform: translateY(0);
        }
        25% {
          transform: translateY(-8px);
        }
        50% {
          transform: translateY(-4px);
        }
        75% {
          transform: translateY(-2px);
        }
      }

      /* Subtle pulse for icons */
      @keyframes toastIconPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.15);
        }
      }

      /* Shimmer effect for LUNAS */
      @keyframes toastShimmer {
        0% {
          background-position: -200% center;
        }
        100% {
          background-position: 200% center;
        }
      }

      /* Mini confetti fall */
      @keyframes miniConfettiFall {
        0% {
          transform: translateY(-20px) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(60px) rotate(360deg);
          opacity: 0;
        }
      }

      /* Toast container classes */
      .toast-container {
        animation: toastSlideIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      }

      .toast-container.closing {
        animation: toastSlideOut 0.3s cubic-bezier(0.55, 0.085, 0.68, 0.53)
          forwards;
      }

      .toast-icon {
        animation: toastIconPulse 0.6s ease-in-out;
      }

      .toast-lunas-bounce {
        animation: toastBounce 0.8s ease-in-out;
      }

      .toast-shimmer {
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.3) 50%,
          transparent 100%
        );
        background-size: 200% 100%;
        animation: toastShimmer 2s linear infinite;
      }

      .mini-confetti {
        animation: miniConfettiFall 1.5s ease-out forwards;
      }

      /* Confetti Animation untuk Toast LUNAS */
      @keyframes confetti-1 {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        100% {
          transform: translateY(60px) rotate(360deg);
          opacity: 0;
        }
      }

      @keyframes confetti-2 {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        15% {
          opacity: 1;
        }
        100% {
          transform: translateY(70px) rotate(-360deg);
          opacity: 0;
        }
      }

      @keyframes confetti-3 {
        0% {
          transform: translateY(0) scale(0);
          opacity: 0;
        }
        20% {
          opacity: 1;
        }
        100% {
          transform: translateY(50px) scale(1.5);
          opacity: 0;
        }
      }

      /* Pulse animation untuk toast LUNAS */
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      /* ===== PROFESSIONAL ANIMATIONS ===== */

      /* Counter Number Animation */
      @keyframes numberPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      /* Smooth color transition for animated numbers */
      .animate-number-change {
        transition: color 0.3s ease, transform 0.3s ease;
      }

      /* Pulse effect saat nilai berubah */
      @keyframes valuePulse {
        0%,
        100% {
          transform: scale(1);
          color: inherit;
        }
        50% {
          transform: scale(1.08);
          color: rgb(6, 182, 212);
        }
      }

      /* Smooth fade in for cards */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in-up {
        animation: fadeInUp 0.4s ease-out forwards;
      }

      /* Highlight animation for filtered items */
      @keyframes highlightPulse {
        0% {
          box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.7);
          border-color: rgba(6, 182, 212, 0.5);
        }
        50% {
          box-shadow: 0 0 0 8px rgba(6, 182, 212, 0);
          border-color: rgba(6, 182, 212, 1);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(6, 182, 212, 0);
          border-color: rgba(229, 231, 235, 1);
        }
      }

      .highlight-match {
        animation: highlightPulse 1s ease-out;
        border: 2px solid rgb(6, 182, 212);
        background: linear-gradient(
          to right,
          rgba(6, 182, 212, 0.05),
          transparent
        );
      }

      /* Shimmer effect for loading numbers */
      @keyframes shimmer {
        0% {
          background-position: -1000px 0;
        }
        100% {
          background-position: 1000px 0;
        }
      }

      .shimmer {
        background: linear-gradient(
          to right,
          #f6f7f8 0%,
          #edeef1 20%,
          #f6f7f8 40%,
          #f6f7f8 100%
        );
        background-size: 1000px 100%;
        animation: shimmer 2s linear infinite;
      }

      /* Smooth scale on hover */
      .hover-scale {
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .hover-scale:hover {
        transform: scale(1.02);
      }

      /* Badge animation */
      @keyframes badgeBounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-5px);
        }
      }

      .animate-badge {
        animation: badgeBounce 2s ease-in-out infinite;
      }

      /* Search bar focus animation */
      .search-focus {
        transition: all 0.3s ease;
      }

      .search-focus:focus {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(6, 182, 212, 0.2);
      }
      /* ===== CUTE NUMBER ANIMATIONS ===== */

      /* Subtle bounce for idle animation */
      @keyframes bounce-subtle {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        25% {
          transform: translateY(-3px) scale(1.02);
        }
        75% {
          transform: translateY(-1px) scale(1.01);
        }
      }

      .animate-bounce-subtle {
        animation: bounce-subtle 0.8s ease-in-out;
      }

      /* Slide up animation for increase indicator */
      @keyframes slide-up {
        0% {
          transform: translateY(8px);
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        100% {
          transform: translateY(-4px);
          opacity: 0;
        }
      }

      .animate-slide-up {
        animation: slide-up 1.2s ease-out;
      }

      /* Slide down animation for decrease indicator */
      @keyframes slide-down {
        0% {
          transform: translateY(-8px);
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        100% {
          transform: translateY(4px);
          opacity: 0;
        }
      }

      .animate-slide-down {
        animation: slide-down 1.2s ease-out;
      }

      /* Sparkle effect for increases */
      @keyframes sparkle {
        0% {
          transform: scale(0) rotate(0deg);
          opacity: 0;
        }
        50% {
          transform: scale(1.3) rotate(180deg);
          opacity: 1;
        }
        100% {
          transform: scale(0) rotate(360deg);
          opacity: 0;
        }
      }

      .animate-sparkle {
        animation: sparkle 0.8s ease-out;
      }

      /* Fade out effect */
      @keyframes fade-out {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(0.5) translateY(10px);
          opacity: 0;
        }
      }

      .animate-fade-out {
        animation: fade-out 0.8s ease-out;
      }

      /* Pulse glow effect when animating */
      @keyframes glow-pulse {
        0%,
        100% {
          text-shadow: 0 0 5px rgba(59, 130, 246, 0.3);
        }
        50% {
          text-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }
      }

      /* Cute floating effect for stats cards */
      @keyframes float-cute {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-4px);
        }
      }

      .animate-float-cute {
        animation: float-cute 3s ease-in-out infinite;
      }

      /* Number change color transition */
      .text-changing {
        color: rgb(59, 130, 246);
        transition: color 0.3s ease;
      }
      /* === IDLE ANIMATIONS FOR ICONS === */
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      @keyframes float-delay {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      .animate-float {
        animation: float 3s ease-in-out infinite;
      }

      .animate-float-delay {
        animation: float-delay 3s ease-in-out infinite 1.5s;
      }

      /* Slow pulse for wallet icon */
      @keyframes pulse-slow {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(1.1);
        }
      }

      .animate-pulse-slow {
        animation: pulse-slow 4s ease-in-out infinite;
      }

      /* === CELEBRATION CONFETTI ANIMATIONS === */
      @keyframes confetti-1 {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        100% {
          transform: translateY(100px) rotate(360deg);
          opacity: 0;
        }
      }

      @keyframes confetti-2 {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        15% {
          opacity: 1;
        }
        100% {
          transform: translateY(120px) rotate(-360deg);
          opacity: 0;
        }
      }

      @keyframes confetti-3 {
        0% {
          transform: translateX(0) scale(0);
          opacity: 0;
        }
        20% {
          opacity: 1;
        }
        100% {
          transform: translateX(100px) scale(1);
          opacity: 0;
        }
      }

      @keyframes confetti-4 {
        0% {
          transform: translateX(0) scale(0);
          opacity: 0;
        }
        20% {
          opacity: 1;
        }
        100% {
          transform: translateX(-100px) scale(1);
          opacity: 0;
        }
      }

      @keyframes confetti-5 {
        0% {
          transform: translateY(0) rotate(0deg) scale(0);
          opacity: 0;
        }
        25% {
          opacity: 1;
        }
        100% {
          transform: translateY(-80px) rotate(180deg) scale(1.5);
          opacity: 0;
        }
      }

      @keyframes confetti-6 {
        0% {
          transform: translateY(0) rotate(0deg) scale(0);
          opacity: 0;
        }
        25% {
          opacity: 1;
        }
        100% {
          transform: translateY(-80px) rotate(-180deg) scale(1.5);
          opacity: 0;
        }
      }

      .animate-confetti-1 {
        animation: confetti-1 2s ease-out;
      }
      .animate-confetti-2 {
        animation: confetti-2 2.2s ease-out 0.2s;
      }
      .animate-confetti-3 {
        animation: confetti-3 1.8s ease-out 0.1s;
      }
      .animate-confetti-4 {
        animation: confetti-4 1.8s ease-out 0.1s;
      }
      .animate-confetti-5 {
        animation: confetti-5 2s ease-out 0.3s;
      }
      .animate-confetti-6 {
        animation: confetti-6 2s ease-out 0.3s;
      }
      /* ========================================= */
      /* FADE OUT ANIMATION - Per Anggota Tab */
      /* ========================================= */
      @keyframes fadeOutSlide {
        0% {
          opacity: 1;
          transform: translateX(0) scale(1);
        }
        50% {
          opacity: 0.5;
          transform: translateX(20px) scale(0.95);
        }
        100% {
          opacity: 0;
          transform: translateX(50px) scale(0.8);
          height: 0;
          margin: 0;
          padding: 0;
        }
      }

      .animate-fade-out-item {
        animation: fadeOutSlide 0.6s ease-out forwards;
      }

      /* Success pulse animation */
      @keyframes successPulse {
        0% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
        }
        50% {
          box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
        }
      }

      .success-pulse {
        animation: successPulse 0.6s ease-out;
      }
      

      /* Disable animation on content update */
      .tab-content.no-animate {
        animation: none !important;
      }

      /* ============================================
         RPG & GAME-LIKE ANIMATIONS (QUEST SYSTEM)
         ============================================ */

      /* Floating Text up (Healing/Income) */
      @keyframes floatUpRPG {
        0% {
          opacity: 0;
          transform: translateY(10px) scale(0.5);
        }
        20% {
          opacity: 1;
          transform: translateY(0) scale(1.2);
        }
        80% {
          opacity: 1;
          transform: translateY(-40px) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(-60px) scale(0.8);
        }
      }

      /* Floating Text down (Damage/Expense) */
      @keyframes floatDownRPG {
        0% {
          opacity: 0;
          transform: translateY(-10px) scale(0.5);
        }
        20% {
          opacity: 1;
          transform: translateY(0) scale(1.2);
        }
        80% {
          opacity: 1;
          transform: translateY(40px) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(60px) scale(0.8);
        }
      }

      /* Rank Pop Animation */
      @keyframes rankPop {
        0% {
          transform: scale(0.8);
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }

      /* 
      ╔════════════════════════════════════════════════════════════════════╗
      ║ 🎮 RPG & GAME-LIKE ANIMATIONS (QUEST SYSTEM)                       ║
      ╚════════════════════════════════════════════════════════════════════╝
      */

      /* Floating Text up (Income/Heal) */
      @keyframes floatUpRPG {
        0% { opacity: 0; transform: translate(-50%, 20px) scale(0.5); }
        20% { opacity: 1; transform: translate(-50%, 0) scale(1.2); }
        80% { opacity: 1; transform: translate(-50%, -60px) scale(1.1); }
        100% { opacity: 0; transform: translate(-50%, -100px) scale(1); }
      }

      /* Floating Text down (Expense/Damage) */
      @keyframes floatDownRPG {
        0% { opacity: 0; transform: translate(-50%, -20px) scale(0.5); }
        20% { opacity: 1; transform: translate(-50%, 0) scale(1.2); }
        80% { opacity: 1; transform: translate(-50%, 60px) scale(1.1); }
        100% { opacity: 0; transform: translate(-50%, 100px) scale(1); }
      }

      .animate-float-up-rpg {
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 9999;
        pointer-events: none;
        color: #00ff88 !important;
        text-shadow: 0 0 15px rgba(0, 255, 136, 0.8), 0 0 30px rgba(0, 255, 136, 0.4);
        font-weight: 900 !important;
        font-size: 2.5rem !important;
        white-space: nowrap;
        animation: floatUpRPG 2s ease-out forwards;
      }

      .animate-float-down-rpg {
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 9999;
        pointer-events: none;
        color: #ff3366 !important;
        text-shadow: 0 0 15px rgba(255, 51, 102, 0.8), 0 0 30px rgba(255, 51, 102, 0.4);
        font-weight: 900 !important;
        font-size: 2.5rem !important;
        white-space: nowrap;
        animation: floatDownRPG 2s ease-out forwards;
      }

      @keyframes shakeRPG {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-10px); }
        40% { transform: translateX(10px); }
        60% { transform: translateX(-10px); }
        80% { transform: translateX(10px); }
      }

      .animate-shake-rpg {
        animation: shakeRPG 0.4s cubic-bezier(.36,.07,.19,.97) both;
      }

      @keyframes rankPop {
        0% { transform: scale(0.8); }
        50% { transform: scale(1.2); filter: brightness(1.5); }
        100% { transform: scale(1); }
      }

      .rank-badge {
        animation: rankPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes milestonePop {
        0% { transform: scale(1); }
        50% { transform: scale(1.15); filter: brightness(2); box-shadow: 0 0 50px rgba(251, 191, 36, 0.5); }
        100% { transform: scale(1); }
      }

      .milestone-celebration {
        animation: milestonePop 1s ease-in-out;
      }

      /* Positive Change - Money In! 💰 */
      @keyframes glowGreen {
        0%,
        100% {
          box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }
        50% {
          box-shadow: 0 0 25px rgba(16, 185, 129, 0.6),
            0 0 50px rgba(16, 185, 129, 0.3);
        }
      }

      @keyframes scaleUp {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      /* 🛠️ INDUSTRIAL CLEAN ANIMATIONS */
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-8px); }
        50% { transform: translateX(8px); }
        75% { transform: translateX(-4px); }
      }

     

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-fade-in-up {
        animation: fadeInUp 0.4s ease-out forwards;
      }

      @keyframes pulse-soft {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }


      /* Muted Forest & Fire Background */
      @keyframes gradientShift {
        0%, 100% {
          background: linear-gradient(180deg, #022c22 0%, #052e16 80%, #451a03 100%);
        }
        50% {
          background: linear-gradient(180deg, #052e16 0%, #022c22 80%, #7c2d12 100%);
        }
      }

      

      @keyframes shineSlide {
        0% {
          left: -100%;
          opacity: 0;
        }
        50% {
          opacity: 0.8;
        }
        100% {
          left: 100%;
          opacity: 0;
        }
      }

      /* Pengeluaran Warning Effects 💸 */
      @keyframes pulseRed {
        0%,
        100% {
          box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
        }
        50% {
          box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }
      }

      @keyframes warningFlash {
        0%,
        100% {
          border-color: rgba(239, 68, 68, 0.3);
        }
        50% {
          border-color: rgba(239, 68, 68, 0.7);
        }
      }

      /* Hover Glow Effects */
      @keyframes hoverGlow {
        0% {
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        100% {
          box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }
      }

      /* Utility Classes */
      .animate-sparkle-green {
        animation: sparkleGreen 0.8s ease-in-out;
      }

      .animate-pulse-red-card {
        animation: pulseRed 0.8s ease-in-out;
      }

      .animate-warning-flash {
        animation: warningFlash 1.5s ease-in-out infinite;
      }

      .shine-effect {
        position: relative;
        overflow: hidden;
      }

      .shine-effect::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        animation: shineSlide 2s ease-in-out infinite;
      }

      /* ============================================
   INTERACTIVE TOOLTIPS - IMPROVEMENT #4
   ============================================ */

      /* Tooltip Card */
      .tooltip-card {
        background: rgba(255, 255, 255, 0.98);
        -webkit-backdrop-filter: blur (10px);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        min-width: 200px;
        max-width: 280px;
      }

      /* Tooltip Arrow */
      .tooltip-arrow {
        position: absolute;
        top: -6px;
        left: 50%;
        width: 12px;
        height: 12px;
        background: rgba(255, 255, 255, 0.98);
        border-left: 1px solid rgba(255, 255, 255, 0.3);
        border-top: 1px solid rgba(255, 255, 255, 0.3);
        transform: translateX(-50%) rotate(45deg);
      }

      /* Progress Bar in Tooltip */
      .tooltip-progress {
        height: 6px;
        background: #e5e7eb;
        border-radius: 3px;
        overflow: hidden;
        position: relative;
      }

      .tooltip-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #10b981, #34d399);
        border-radius: 3px;
        transition: width 0.5s ease;
      }

      /* Tooltip Animations */
      @keyframes tooltipSlideUp {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      .tooltip-container.active {
        animation: tooltipSlideUp 0.3s ease;
      }

      /* Info Icon Pulse */
      @keyframes infoPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.7;
        }
        50% {
          transform: scale(1.1);
          opacity: 1;
        }
      }

      .info-icon {
        animation: infoPulse 2s ease-in-out infinite;
      }

      /* ============================================
   SMART ALERTS & NOTIFICATIONS - IMPROVEMENT #5
   ============================================ */

      /* Alert Banner */
      .alert-banner {
        position: relative;
        padding: 12px 16px;
        border-radius: 12px;
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        animation: slideDown 0.4s ease-out;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Alert Types */
      .alert-warning {
        background: linear-gradient(
          135deg,
          rgba(251, 191, 36, 0.95),
          rgba(245, 158, 11, 0.95)
        );
        color: #441e08;
      }

      .alert-danger {
        background: linear-gradient(
          135deg,
          rgba(239, 68, 68, 0.95),
          rgba(220, 38, 38, 0.95)
        );
        color: white;
      }

      .alert-info {
        background: linear-gradient(
          135deg,
          rgba(59, 130, 246, 0.95),
          rgba(37, 99, 235, 0.95)
        );
        color: white;
      }

      /* Pulsing Alert Icon */
      .alert-icon-pulse {
        animation: alertPulse 2s ease-in-out infinite;
      }

      @keyframes alertPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.15);
          opacity: 0.8;
        }
      }

      /* Badge Notification */
      .notification-badge {
        position: absolute;
        top: -6px;
        right: -6px;
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: rgb(19, 18, 18);
        font-size: 10px;
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);
        animation: badgePop 0.3s ease-out;
      }

      @keyframes badgePop {
        0% {
          transform: scale(0);
        }
        50% {
          transform: scale(1.2);
        }
        100% {
          transform: scale(1);
        }
      }

      /* Dismiss Button */
      .alert-dismiss {
        cursor: pointer;
        opacity: 0.7;
        transition: all 0.2s ease;
      }

      .alert-dismiss:hover {
        opacity: 1;
        transform: scale(1.1);
      }

      /* Alert Shake Animation */
      @keyframes alertShake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-4px);
        }
        75% {
          transform: translateX(4px);
        }
      }

      .alert-shake {
        animation: alertShake 0.5s ease-in-out;
      }

      /* Sticky Alert Bar */
      .sticky-alert {
        position: sticky;
        top: 60px;
        z-index: 40;
        margin-bottom: 16px;
      }

      /* Progress Indicator in Alert */
      .alert-progress {
        height: 4px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 8px;
      }

      .alert-progress-fill {
        height: 100%;
        background: white;
        border-radius: 2px;
        transition: width 0.3s ease;
      }

      /* ========================================
   CELEBRATION ANIMATIONS
   ======================================== */
      @keyframes bounce-slow {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-5px);
        }
      }

      .animate-bounce-slow {
        animation: bounce-slow 2s ease-in-out infinite;
      }

      @keyframes scale-in {
        0% {
          transform: scale(0.9);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .animate-scale-in {
        animation: scale-in 0.3s ease-out;
      }

      /* Progress bar glow effect saat complete */
      @keyframes glow {
        0%,
        100% {
          box-shadow: 0 0 5px rgba(34, 197, 94, 0.5);
        }
        50% {
          box-shadow: 0 0 20px rgba(34, 197, 94, 0.8);
        }
      }

      /* ============ TAB STATISTIK ANIMATIONS ============ */

      /* Skeleton shimmer effect */
      @keyframes shimmer {
        0% {
          background-position: -1000px 0;
        }
        100% {
          background-position: 1000px 0;
        }
      }

      .skeleton {
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.1) 0%,
          rgba(255, 255, 255, 0.3) 50%,
          rgba(255, 255, 255, 0.1) 100%
        );
        background-size: 1000px 100%;
        animation: shimmer 1.5s infinite;
      }

      /* Fade slide in animation */
      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ========================================= */
      /* IMPROVED ANIMATIONS - SMOOTH & ORGANIC  */
      /* ========================================= */

      /* Smooth Fade Slide In */
      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .fade-slide-in {
        animation: fadeSlideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      /* Smooth Stagger - IMPROVED */
      .stagger-item {
        opacity: 0;
        animation: fadeSlideIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      .stagger-item:nth-child(1) {
        animation-delay: 0ms;
      }
      .stagger-item:nth-child(2) {
        animation-delay: 100ms;
      }
      .stagger-item:nth-child(3) {
        animation-delay: 200ms;
      }
      .stagger-item:nth-child(4) {
        animation-delay: 300ms;
      }
      .stagger-item:nth-child(5) {
        animation-delay: 400ms;
      }
      .stagger-item:nth-child(6) {
        animation-delay: 500ms;
      }
      .stagger-item:nth-child(7) {
        animation-delay: 600ms;
      }
      .stagger-item:nth-child(8) {
        animation-delay: 700ms;
      }

      /* Card Interactive - SPRING BOUNCE */
      .card-interactive {
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .card-interactive:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
      }

      .card-interactive:active {
        transform: translateY(-2px) scale(0.98);
        transition-duration: 0.15s;
      }

      /* Smooth Scroll */
      * {
        scroll-behavior: smooth;
      }

      /* Overflow Fade Effect */
      .overflow-y-auto {
        position: relative;
      }

      .overflow-y-auto::after {
        content: "";
        position: sticky;
        bottom: 0;
        left: 0;
        right: 0;
        height: 40px;
        background: linear-gradient(to bottom, transparent, white);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
      }

      .overflow-y-auto:hover::after {
        opacity: 1;
      }

      /* Bar Chart Hover - SMOOTH */
      .bar-chart-item {
        transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .bar-chart-item:hover {
        transform: scale(1.05);
        filter: brightness(1.1);
      }

      /* Button Press Feedback */
      button {
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      button:active {
        transform: scale(0.95);
      }

      /* Tooltip Smooth Fade */
      .tooltip-container {
        animation: tooltipFadeIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes tooltipFadeIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.9);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* Activity Item Slide - SMOOTH FROM BOTTOM */
      @keyframes activitySlideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Number Animation - SMOOTH COUNTER */
      @keyframes numberPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      /* Tab Change - SLIDE FADE */
      .tab-content {
        animation: tabSlideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes tabSlideIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* Pulse animation */
      @keyframes pulse-soft {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
      }

      .pulse-soft {
        animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      /* ================================= */
      /* MODAL ANIMATION - SMOOTH & COZY */
      /* ================================= */

      @keyframes modalFadeIn {
        from {
          opacity: 0;
          -webkit-backdrop-filter: blur(0px);
          backdrop-filter: blur(0px);
        }
        to {
          opacity: 1;
          -webkit-backdrop-filter: blur(8px);
          backdrop-filter: blur(8px);
        }
      }

      @keyframes modalSlideUp {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .modal-backdrop {
        animation: modalFadeIn 0.2s ease-out;
      }

      .modal-content {
        animation: modalSlideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* Smooth scroll for modal */
      .modal-scroll {
        /* Firefox support */
        scrollbar-width: thin;
        scrollbar-color: #cbd5e1 #f1f5f9;
      }

      /* Webkit browsers (Chrome, Safari, Edge) */
      .modal-scroll::-webkit-scrollbar {
        width: 6px;
      }

      .modal-scroll::-webkit-scrollbar-track {
        background: #f1f5f9;
        border-radius: 10px;
      }

      .modal-scroll::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }

      .modal-scroll::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Modal slide up animation */
      @keyframes slideUpModal {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Mobile: slide from bottom */
      @media (max-width: 640px) {
        @keyframes slideUpModal {
          from {
            transform: translateY(100%);
          }
          to {
            transform: translateY(0);
          }
        }
      }
      /* Pop in animation - Fun & Bouncy */
      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0.5) rotate(-5deg);
        }
        70% {
          transform: scale(1.05) rotate(2deg);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotate(0);
        }
      }
      /* Modal Pop Animation */
      @keyframes modalPop {
        0% {
          opacity: 0;
          transform: scale(0.8) translateY(20px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      /* 🎮 COZY PIXEL LOADING SCREEN - SLICE OF LIFE */
      .loading-screen-cozy {
        position: fixed;
        inset: 0;
        background: linear-gradient(
          135deg,
          #667eea 0%,
          #764ba2 50%,
          #f093fb 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        overflow: hidden;
      }

      .cozy-container {
        position: relative;
        text-align: center;
        max-width: 400px;
        padding: 20px;
      }

      /* 🎨 Pixel Character */
      .pixel-character {
        position: relative;
        width: 80px;
        height: 100px;
        margin: 0 auto 30px;
        animation: characterBounce 1.5s ease-in-out infinite;
      }

      .char-head {
        width: 40px;
        height: 40px;
        background: #ffd700;
        border-radius: 8px;
        margin: 0 auto 5px;
        box-shadow: 0 4px 0 #f59e0b, inset -4px -4px 0 rgba(0, 0, 0, 0.1);
        position: relative;
      }

      .char-head::before {
        content: "◠ᴗ◠";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 16px;
        color: #8b5cf6;
      }

      .char-body {
        width: 50px;
        height: 35px;
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        border-radius: 8px;
        margin: 0 auto;
        box-shadow: 0 4px 0 #1e40af;
      }

      .char-arms {
        width: 60px;
        height: 8px;
        background: #fbbf24;
        border-radius: 4px;
        margin: -20px auto 0;
        animation: armsWave 1s ease-in-out infinite alternate;
      }

      @keyframes characterBounce {
        0%,
        100% {
          transform: translateY(0) rotate(-2deg);
        }
        50% {
          transform: translateY(-15px) rotate(2deg);
        }
      }

      @keyframes armsWave {
        0% {
          transform: rotate(-5deg);
        }
        100% {
          transform: rotate(5deg);
        }
      }

      /* 💰 Floating Coins */
      .floating-coins {
        position: absolute;
        top: 20%;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 100px;
        pointer-events: none;
      }

      .coin {
        position: absolute;
        font-size: 24px;
        animation: coinFloat 3s ease-in-out infinite;
      }

      .coin-1 {
        left: 0;
        animation-delay: 0s;
      }

      .coin-2 {
        left: 50%;
        transform: translateX(-50%);
        animation-delay: 0.5s;
      }

      .coin-3 {
        right: 0;
        animation-delay: 1s;
      }

      @keyframes coinFloat {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        50% {
          transform: translateY(-30px) rotate(180deg);
          opacity: 0.7;
        }
      }

      /* ✨ Loading Text */
      .loading-text-group {
        margin: 20px 0;
      }

      .cozy-title {
        font-size: 28px;
        font-weight: 800;
        color: #ffffff;
        text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.2),
          0 0 20px rgba(255, 255, 255, 0.5);
        margin-bottom: 10px;
        animation: titlePulse 2s ease-in-out infinite;
        letter-spacing: 1px;
      }

      .cozy-subtitle {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.9);
        font-weight: 500;
        animation: subtitleFade 2s ease-in-out infinite;
      }

      @keyframes titlePulse {
        0%,
        100% {
          transform: scale(1);

        const loadingScreen = document.getElementById("loadingScreen");
        if (!loadingScreen) return;

        const progressFill = document.getElementById("progressFill");
        const progressText = document.getElementById("progressText");

        let progress = 0;
        let animationSpeed = 20; // ms per update

        // Progress animation
        const progressInterval = setInterval(() => {
          // Natural progress speed - slower near end
          if (progress < 30) {
            progress += 2; // Fast start
          } else if (progress < 70) {
            progress += 1; // Medium
          } else {
            progress += 0.5; // Slow finish
          }

          if (progress >= 99) {
            progress = 99; // Stop at 99%, wait for app ready
          }

          if (progressFill) progressFill.style.width = `${progress}%`;
          if (progressText)
            progressText.textContent = `${Math.floor(progress)}%`;
        }, animationSpeed);

        // Listen for app ready signal
        window.appReady = () => {
          progress = 100;
          if (progressFill) progressFill.style.width = "100%";
          if (progressText) progressText.textContent = "100%";

          clearInterval(progressInterval);

          // Wait 300ms then hide loading screen
          setTimeout(() => {
            if (loadingScreen) {
              loadingScreen.style.opacity = "0";
              loadingScreen.style.transition = "opacity 0.3s ease-out";
              setTimeout(() => {
                loadingScreen.style.display = "none";
              }, 300);

          }, 300);

      // === ANIMATED NUMBER - FINAL VERSION (SIMPLE & STABLE) ===
      const AnimatedNumber = ({ value, prefix = "Rp ", id = "num" }) => {
        const [display, setDisplay] = React.useState(value);
        const frameRef = React.useRef();

        React.useEffect(() => {
          if (!window.numberAnimationState[id]) {
            window.numberAnimationState[id] = {
              initialized: false,
              lastValue: 0,
            };
          }
          const state = window.numberAnimationState[id];

          if (frameRef.current) cancelAnimationFrame(frameRef.current);

          if (!state.initialized) {
            state.initialized = true;
            state.lastValue = value;
            if (value === 0) {
              setDisplay(0);
              return;
            }

            const start = Date.now();
            const animate = () => {
              const elapsed = Date.now() - start;
              const progress = Math.min(elapsed / 800, 1);
              const ease = 1 - Math.pow(1 - progress, 3);
              setDisplay(Math.floor(value * ease));
              if (progress < 1)
                frameRef.current = requestAnimationFrame(animate);
              else setDisplay(value);
            };
            frameRef.current = requestAnimationFrame(animate);
            return;
          }

          const oldVal = state.lastValue;
          const newVal = value;
          if (oldVal === newVal) {
            setDisplay(value);
            return;
          }

          const start = Date.now();
          const animate = () => {
            const elapsed = Date.now() - start;
            const progress = Math.min(elapsed / 600, 1);
            const ease = 1 - Math.pow(1 - progress, 3);
            const current = oldVal + (newVal - oldVal) * ease;
            setDisplay(Math.floor(current));
            if (progress < 1) {
              frameRef.current = requestAnimationFrame(animate);
            } else {
              setDisplay(newVal);
              state.lastValue = newVal;
            }
          };
          frameRef.current = requestAnimationFrame(animate);

          return () => {
            if (frameRef.current) cancelAnimationFrame(frameRef.current);
          };
        }, [value, id]);

          const prevNum =

            const backupData = {

              },
            };

            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            const dateStr = new Date().toISOString().slice(0, 10);
            link.download = `KasKelas-Backup-${dateStr}.json`;

        // 📥 RESTORE: Import data dari file JSON dengan Validasi Ketat
        const handleRestoreData = (event) => {
          const file = event.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const backupData = JSON.parse(e.target.result);

              // 🛡️ VALIDASI SKEMA: Memastikan file benar-benar backup KasKelas
              const requiredKeys = [
                "transactions",
                "members",
                "appConfig",
                "kasMingguan",
              ];
              const hasAllKeys = requiredKeys.every(
                (key) => backupData.data && key in backupData.data
              );

              if (!hasAllKeys) {
                throw new Error("File backup tidak valid atau rusak!");
              }

              setConfirmModal({
                title: "🔄 Konfirmasi Restore",
                message:
                  "Seluruh data saat ini akan diganti dengan data dari file backup. Lanjutkan?",
                icon: "⚠️",
                type: "warning",
                confirmText: "Ya, Restore Sekarang",
                cancelText: "Batal",
                onConfirm: () => {
                  // 🛡️ CRITICAL: Stop saving immediately to prevent race condition
                  setIsDataLoaded(false);

                  const data = backupData.data;

                  // Simpan ke LocalStorage secara massal
                  const storageMap = {
                    kasKelas_transactions: data.transactions || [],
                    kasKelas_saldo: data.saldo || "0",
                    kasKelas_iuranKhusus: data.iuranKhusus || [],
                    kasKelas_payments: data.payments || {},
                    kasKelas_disabledWeeks: data.disabledWeeks || {},
                    kasKelas_kasMingguan: data.kasMingguan || {},
                    kasKelas_cicilan: data.cicilan || {},
                    kasKelas_activities: data.activities || [],
                    kasKelas_config: data.appConfig || data.config || {}, 
                    kasKelas_members: data.members || [],
                  };

                  Object.entries(storageMap).forEach(([key, val]) => {
                    localStorage.setItem(key, JSON.stringify(val));
                  });

                  showToast(
                    "✅ Restore berhasil! Sistem akan dimuat ulang...",
                    "success"
                  );

                  // Jeda singkat agar browser selesai menulis data sebelum reload

        const convertToCSV = (data) => {
          if (!data || data.length === 0) return "";

          const headers = Object.keys(data[0]);
          const csvRows = [];

          csvRows.push(headers.join(","));

          for (const row of data) {
            const values = headers.map((header) => {
              const value = row[header];
              if (
                value &&
                (value.toString().includes(",") ||
                  value.toString().includes('"'))
              ) {
                return `"${value.toString().replace(/"/g, '""')}"`;
              }
              return value || "";
            });
            csvRows.push(values.join(","));
          }

          return csvRows.join("\n");
        };

                                const totalCicilan = getTotalCicilan(
