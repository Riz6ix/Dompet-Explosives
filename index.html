                                </span>
                              </div>

                              {/* Progress Bar */}
                              <div className="pt-2">
                                <div className="flex justify-between text-xs mb-1.5">
                                  <span className="text-green-600 font-medium">
                                    Rp {totalPaid.toLocaleString("id-ID")}
                                  </span>
                                  <span className="text-gray-500 font-medium">
                                    {Math.round(progress)}%
                                  </span>
                                  <span className="text-orange-600 font-medium">
                                    Rp {remaining.toLocaleString("id-ID")}
                                  </span>
                                </div>
                                <div className="relative h-4 bg-gray-200 rounded-full overflow-hidden">
                                  <div
                                    className={`absolute h-full transition-all duration-300 ${
                                      progress >= 100
                                        ? "bg-green-500"
                                        : "bg-gray-700"
                                    }`}
                                    style={{
                                      width: `${Math.min(progress, 100)}%`,
                                    }}
                                  />
                                </div>
                              </div>

                              <div className="flex justify-between pt-2 border-t border-gray-200">
                                <span className="text-gray-600 font-medium">
                                  Target:
                                </span>
                                <span className="font-semibold text-gray-900">
                                  Rp {maxAmount.toLocaleString("id-ID")}
                                </span>
                              </div>

                              {isLunas && (
                                <div className="bg-green-50 border border-green-200 rounded p-2 text-center">
                                  <span className="text-green-700 font-semibold text-xs">
                                    ✓ SUDAH LUNAS
                                  </span>
                                </div>
                              )}

                              {existingCicilan.length > 0 && (
                                <div className="pt-2 border-t border-gray-200">
                                  <div className="text-xs text-gray-600 mb-1.5 font-medium">
                                    Riwayat Cicilan ({existingCicilan.length}x):
                                  </div>
                                  <div className="space-y-1 max-h-28 overflow-y-auto">
                                    {existingCicilan.map((c, idx) => (
                                      <div
                                        key={c.id}
                                        className="flex justify-between text-xs bg-white border border-gray-200 rounded p-2"
                                      >
                                        <span className="text-gray-600">
                                          #{idx + 1} - {c.date}
                                        </span>
                                        <span className="font-semibold text-green-600">
                                          +Rp {c.amount.toLocaleString("id-ID")}
                                        </span>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              )}
                            </div>
                          </div>
                        );
                      })()}

                    {/* JUMLAH CICILAN */}
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">
                        Jumlah Cicilan (Rp)
                      </label>
                      <input
                        type="number"
                        value={cicilanForm.amount}
                        onChange={(e) =>
                          setCicilanForm({
                            ...cicilanForm,
                            amount: parseInt(e.target.value) || "",
                          })
                        }
                        placeholder="Masukkan jumlah cicilan"
                        className="w-full p-2.5 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-400 focus:border-gray-400 text-sm bg-white"
                      />
                      {/* ✅ LIVE PREVIEW NOMINAL */}
                      {cicilanForm.amount && (
                        <p className="mt-1 text-[10px] font-bold text-emerald-600 italic">
                          Format: Rp{" "}
                          {Number(cicilanForm.amount).toLocaleString("id-ID")}
                        </p>
                      )}
                    </div>

                    {/* KETERANGAN */}
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">
                        Keterangan (Opsional)
                      </label>
                      <textarea
                        value={cicilanForm.keterangan}
                        onChange={(e) =>
                          setCicilanForm({
                            ...cicilanForm,
                            keterangan: e.target.value,
                          })
                        }
                        placeholder="Catatan tambahan..."
                        rows={2}
                        className="w-full p-2.5 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-400 focus:border-gray-400 text-sm bg-white"
                      />
                    </div>

                    {/* TOMBOL SUBMIT */}
                    <div className="flex gap-3 pt-2">
                      <button
                        onClick={() => setCicilanForm({ memberNo: undefined })}
                        className="flex-1 py-2.5 px-4 bg-gray-200 text-gray-700 rounded-lg font-semibold text-sm hover:bg-gray-300 transition-all"
                      >
                        Batal
                      </button>
                      <button
                        onClick={handleCicilanSubmit}
                        className="flex-1 py-2.5 px-4 bg-gray-800 hover:bg-gray-900 text-white rounded-lg font-semibold text-sm shadow-md hover:shadow-lg transition-all"
                      >
                        Tambah Cicilan
                      </button>
                    </div>
                  </div>
                )}

                {/* RIWAYAT CICILAN */}
                <div className="glass-card p-4">
                  <h3 className="font-semibold text-gray-800 mb-4 flex items-center gap-2 text-base">
                    <HistoryIcon />
                    <span>Riwayat Cicilan</span>
                  </h3>

                  {Object.keys(cicilan).length === 0 ? (
                    <div className="text-center py-12 text-gray-400">
                      <DollarSign
                        size={48}
                        className="mx-auto mb-3 text-gray-300"
                      />
                      <p className="font-semibold text-gray-500">
                        Belum ada cicilan
                      </p>
                      <p className="text-sm mt-1">
                        Tambah cicilan pertama untuk memulai
                      </p>
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {Object.entries(cicilan)
                        .filter(
                          ([_, cicilanList]) =>
                            cicilanList && cicilanList.length > 0
                        )
                        .map(([key, cicilanList]) => {
                          const [type, ...rest] = key.split("-");
                          const memberNo = parseInt(rest[rest.length - 1]);
                          const member = members.find((m) => m.no === memberNo);

                          const firstCicilan = cicilanList[0];
                          let itemName =
                            firstCicilan?.itemName || "Item tidak diketahui";

                          const totalCicilan = cicilanList.reduce(
                            (sum, c) => sum + c.amount,
                            0
                          );

                          return (
                            <div
                              key={key}
                              className="bg-gray-50 border-2 border-gray-200 rounded-lg p-4 hover:border-gray-300 transition-colors"
                            >
                              <div className="flex items-start justify-between mb-3">
                                <div className="flex-1">
                                  <div className="font-semibold text-gray-900 flex items-center gap-2 text-sm">
                                    <div
                                      className={`w-2 h-2 rounded-full ${
                                        member?.jk === "L"
                                          ? "bg-blue-500"
                                          : "bg-pink-500"
                                      }`}
                                    />
                                    {firstCicilan?.memberName ||
                                      member?.nama ||
                                      "Unknown"}
                                  </div>
                                  <div className="text-xs text-gray-500 mt-0.5">
                                    {itemName}
                                  </div>
                                </div>
                                <div className="text-right">
                                  <div className="text-xs text-gray-500">
                                    {cicilanList.length}x cicilan
                                  </div>
                                  <div className="font-bold text-gray-900 text-sm">
                                    Rp {totalCicilan.toLocaleString("id-ID")}
                                  </div>
                                </div>
                              </div>

                              <div className="space-y-1.5">
                                {cicilanList.map((c, idx) => (
                                  <div
                                    key={c.id}
                                    className="bg-white border border-gray-200 rounded-lg p-2.5 flex justify-between items-start text-xs hover:border-gray-300 transition-colors"
                                  >
                                    <div className="flex-1">
                                      <div className="font-semibold text-gray-800">
                                        #{idx + 1} - {c.date}
                                      </div>
                                      <div className="text-gray-500">
                                        {c.time}
                                      </div>
                                      {c.keterangan && (
                                        <div className="text-gray-600 italic mt-0.5">
                                          "{c.keterangan}"
                                        </div>
                                      )}
                                    </div>
                                    <div className="font-bold text-green-600 ml-3">
                                      +Rp {c.amount.toLocaleString("id-ID")}
                                    </div>
                                  </div>
                                ))}
                              </div>
                            </div>
                          );
                        })}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* ========================================
    MODAL KONFIRMASI TOGGLE STATUS - FIXED
    ======================================== */}
            {toggleConfirm &&
              (() => {
                // BACA STATUS REAL-TIME DARI STATE (BUKAN DARI PARAMETER)
                let currentRealStatus = false;

                if (toggleConfirm.type === "kas") {
                  const key = `${toggleConfirm.week}-${toggleConfirm.memberNo}`;
                  currentRealStatus = kasMingguan[key] === true;
                } else if (toggleConfirm.type === "iuran") {
                  const key = `${toggleConfirm.iuranId}-${toggleConfirm.memberNo}`;
                  currentRealStatus = payments[key] === true;
                }

                // TENTUKAN AKSI & PESAN BERDASARKAN STATUS REAL
                const actionText = currentRealStatus ? "Batalkan" : "Lunaskan";
                const actionColor = currentRealStatus ? "red" : "green";
                const statusChangeText = currentRealStatus
                  ? "BELUM BAYAR"
                  : "LUNAS";

                return (
                  <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden animate-scale-in">
                      {/* Header dengan Icon */}
                      <div
                        className={`p-6 ${
                          currentRealStatus
                            ? "bg-gradient-to-r from-red-50 to-orange-50"
                            : "bg-gradient-to-r from-green-50 to-emerald-50"
                        }`}
                      >
                        <div className="flex items-center justify-center mb-4">
                          <div
                            className={`w-20 h-20 rounded-full ${
                              currentRealStatus ? "bg-red-100" : "bg-green-100"
                            } flex items-center justify-center`}
                          >
                            {currentRealStatus ? (
                              // Icon X untuk batalkan
                              <svg
                                className="w-10 h-10 text-red-600"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                              >
                                <path
                                  strokeLinecap="round"
                                  strokeLinejoin="round"
                                  strokeWidth={2}
                                  d="M6 18L18 6M6 6l12 12"
                                />
                              </svg>
                            ) : (
                              // Icon Check untuk lunas
                              <svg
                                className="w-10 h-10 text-green-600"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                              >
                                <path
                                  strokeLinecap="round"
                                  strokeLinejoin="round"
                                  strokeWidth={2}
                                  d="M5 13l4 4L19 7"
                                />
                              </svg>
                            )}
                          </div>
                        </div>

                        <h3 className="text-xl font-bold text-center text-gray-800 mb-2">
                          {actionText} Status Pembayaran?
                        </h3>

                        <p className="text-center text-gray-600 text-sm">
                          Status akan berubah menjadi{" "}
                          <span
                            className={`font-bold ${
                              currentRealStatus
                                ? "text-red-600"
                                : "text-green-600"
                            }`}
                          >
                            {statusChangeText}
                          </span>
                          . Pastikan sudah diterima!
                        </p>
                      </div>

                      {/* Detail Info */}
                      <div className="p-6 space-y-3">
                        <div className="bg-gray-50 rounded-lg p-4 border border-gray-200">
                          <div className="flex items-center gap-3 mb-3">
                            <div
                              className={`w-10 h-10 rounded-full flex items-center justify-center ${
                                members.find(
                                  (m) => m.no === toggleConfirm.memberNo
                                )?.jk === "L"
                                  ? "bg-blue-100 text-blue-600"
                                  : "bg-pink-100 text-pink-600"
                              }`}
                            >
                              <Users size={20} />
                            </div>
                            <div className="flex-1">
                              <h4 className="font-bold text-gray-800 text-lg">
                                {toggleConfirm.memberName}
                              </h4>
                              <p className="text-xs text-gray-500">
                                No. {toggleConfirm.memberNo}
                              </p>
                            </div>
                          </div>

                          <div className="bg-white rounded-lg p-3 border border-gray-200">
                            <div className="flex items-center gap-2 text-sm">
                              <ClipboardList
                                size={16}
                                className="text-gray-500"
                              />
                              <span className="font-semibold text-gray-700">
                                {toggleConfirm.itemName}
                              </span>
                            </div>
                          </div>
                        </div>

                        {/* Warning jika batalkan */}
                        {currentRealStatus && (
                          <div className="bg-yellow-50 border-l-4 border-yellow-400 p-3 rounded">
                            <div className="flex items-start gap-2">
                              <svg
                                className="w-5 h-5 text-yellow-600 flex-shrink-0 mt-0.5"
                                fill="currentColor"
                                viewBox="0 0 20 20"
                              >
                                <path
                                  fillRule="evenodd"
                                  d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"
                                  clipRule="evenodd"
                                />
                              </svg>
                              <p className="text-xs text-yellow-800">
                                <span className="font-semibold">
                                  Peringatan:
                                </span>{" "}
                                Transaksi terkait akan dihapus dan saldo akan
                                berkurang.
                              </p>
                            </div>
                          </div>
                        )}
                      </div>

                      {/* Tombol Aksi */}
                      <div className="p-6 bg-gray-50 flex gap-3">
                        <button
                          onClick={() => {
                            setToggleConfirm(null);
                            setIsToggling(false);
                          }}
                          disabled={isToggling}
                          className="flex-1 py-3 px-4 bg-white border-2 border-gray-300 rounded-xl font-semibold text-gray-700 hover:bg-gray-50 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                          Batal
                        </button>

                        <button
                          onClick={executeToggle}
                          disabled={isToggling}
                          className={`flex-1 py-3 px-4 rounded-xl font-semibold text-white transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-lg ${
                            currentRealStatus
                              ? "bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700"
                              : "bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700"
                          }`}
                        >
                          {isToggling ? (
                            <>
                              <svg
                                className="animate-spin h-5 w-5"
                                fill="none"
                                viewBox="0 0 24 24"
                              >
                                <circle
                                  className="opacity-25"
                                  cx="12"
                                  cy="12"
                                  r="10"
                                  stroke="currentColor"
                                  strokeWidth="4"
                                />
                                <path
                                  className="opacity-75"
                                  fill="currentColor"
                                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                                />
                              </svg>
                              <span>Proses...</span>
                            </>
                          ) : (
                            <>
                              {currentRealStatus ? (
                                <svg
                                  className="w-5 h-5"
                                  fill="none"
                                  stroke="currentColor"
                                  viewBox="0 0 24 24"
                                >
                                  <path
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                    strokeWidth={2}
                                    d="M6 18L18 6M6 6l12 12"
                                  />
                                </svg>
                              ) : (
                                <svg
                                  className="w-5 h-5"
                                  fill="none"
                                  stroke="currentColor"
                                  viewBox="0 0 24 24"
                                >
                                  <path
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                    strokeWidth={2}
                                    d="M5 13l4 4L19 7"
                                  />
                                </svg>
                              )}
                              <span>Ya, {actionText}</span>
                            </>
                          )}
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })()}
            {/* ════════════════════════════════════════════════════════════ */}
            {/* 🎨 CUSTOM CONFIRMATION MODAL - FIXED HOOKS                   */}
            {/* ════════════════════════════════════════════════════════════ */}
            {confirmModal && (
              <div
                style={{
                  position: "fixed",
                  top: 0,
                  left: 0,
                  right: 0,
                  bottom: 0,
                  background: "rgba(0, 0, 0, 0.6)",
                  WebkitBackdropFilter: "blur(8px)",
                  backdropFilter: "blur(8px)",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  zIndex: 99999,
                  padding: "20px",
                  animation: "fadeIn 0.2s ease-out",
                }}
                onClick={() => {
                  setConfirmModal(null);
                  setConfirmInput("");
                }}
              >
                <div
                  style={{
                    background: "rgba(255, 255, 255, 0.95)",
                    WebkitBackdropFilter: "blur(20px)",
                    backdropFilter: "blur(20px)",
                    borderRadius: "24px",
                    padding: "32px",
                    maxWidth: "480px",
                    width: "100%",
                    boxShadow: "0 20px 60px rgba(0, 0, 0, 0.3)",
                    border: "1px solid rgba(255, 255, 255, 0.3)",
                    animation:
                      "modalSlideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)",
                    position: "relative",
                  }}
                  onClick={(e) => e.stopPropagation()}
                >
                  {/* Icon */}
                  <div
                    style={{
                      fontSize: "56px",
                      textAlign: "center",
                      marginBottom: "16px",
                      animation: "iconBounce 0.5s ease-out",
                    }}
                  >
                    {confirmModal.icon}
                  </div>

                  {/* Title */}
                  <h3
                    style={{
                      fontSize: "24px",
                      fontWeight: "700",
                      color:
                        confirmModal.type === "danger"
                          ? "#dc2626"
                          : "#f59e0b",
                      textAlign: "center",
                      marginBottom: "12px",
                      lineHeight: "1.2",
                    }}
                  >
                    {confirmModal.title}
                  </h3>

                  {/* Message */}
                  <p
                    style={{
                      fontSize: "15px",
                      color: "#4b5563",
                      textAlign: "center",
                      lineHeight: "1.6",
                      marginBottom: "28px",
                    }}
                  >
                    {confirmModal.message}
                  </p>

                  {/* Optional Input Field */}
                  {confirmModal.withInput && (
                    <div style={{ marginBottom: "24px" }}>
                      <input
                        type="text"
                        value={confirmInput}
                        onChange={(e) => setConfirmInput(e.target.value)}
                        placeholder={
                          confirmModal.inputPlaceholder || "Ketik konfirmasi..."
                        }
                        style={{
                          width: "100%",
                          padding: "12px 16px",
                          borderRadius: "12px",
                          border: "2px solid #e5e7eb",
                          fontSize: "16px",
                          textAlign: "center",
                          outline: "none",
                          transition: "all 0.2s",
                        }}
                        onFocus={(e) =>
                          (e.target.style.borderColor = "#3b82f6")
                        }
                        onBlur={(e) =>
                          (e.target.style.borderColor = "#e5e7eb")
                        }
                      />
                      <p
                        style={{
                          fontSize: "12px",
                          color: "#6b7280",
                          textAlign: "center",
                          marginTop: "8px",
                        }}
                      >
                        Ketik{" "}
                        <strong style={{ color: "#ef4444" }}>
                          {confirmModal.expectedInput}
                        </strong>{" "}
                        untuk melanjutkan
                      </p>
                    </div>
                  )}

                  {/* Buttons */}
                  <div
                    style={{
                      display: "flex",
                      gap: "12px",
                      flexDirection: "column",
                    }}
                  >
                    {/* Confirm Button */}
                    <button
                      onClick={() => {
                        confirmModal.onConfirm();
                        setConfirmModal(null);
                        setConfirmInput("");
                      }}
                      disabled={
                        confirmModal.withInput &&
                        confirmInput !== confirmModal.expectedInput
                      }
                      style={{
                        width: "100%",
                        padding: "16px",
                        background:
                          confirmModal.withInput &&
                          confirmInput !== confirmModal.expectedInput
                            ? "#e5e7eb"
                            : confirmModal.type === "danger"
                            ? "linear-gradient(135deg, #dc2626, #991b1b)"
                            : "linear-gradient(135deg, #f59e0b, #d97706)",
                        color:
                          confirmModal.withInput &&
                          confirmInput !== confirmModal.expectedInput
                            ? "#9ca3af"
                            : "white",
                        border: "none",
                        borderRadius: "14px",
                        fontSize: "16px",
                        fontWeight: "600",
                        cursor:
                          confirmModal.withInput &&
                          confirmInput !== confirmModal.expectedInput
                            ? "not-allowed"
                            : "pointer",
                        transition: "all 0.2s",
                        boxShadow:
                          confirmModal.withInput &&
                          confirmInput !== confirmModal.expectedInput
                            ? "none"
                            : "0 4px 12px rgba(0, 0, 0, 0.15)",
                        opacity:
                          confirmModal.withInput &&
                          confirmInput !== confirmModal.expectedInput
                            ? 0.7
                            : 1,
                      }}
                    >
                      {confirmModal.confirmText}
                    </button>

                    {/* Cancel Button */}
                    <button
                      onClick={() => {
                        setConfirmModal(null);
                        setConfirmInput("");
                      }}
                      style={{
                        width: "100%",
                        padding: "16px",
                        background: "#f3f4f6",
                        color: "#374151",
                        border: "2px solid #e5e7eb",
                        borderRadius: "14px",
                        fontSize: "16px",
                        fontWeight: "600",
                        cursor: "pointer",
                        transition: "all 0.2s",
                      }}
                    >
                      {confirmModal.cancelText}
                    </button>
                  </div>

                  {/* Close Button (X) */}
                  <button
                    onClick={() => {
                      setConfirmModal(null);
                      setConfirmInput("");
                    }}
                    style={{
                      position: "absolute",
                      top: "16px",
                      right: "16px",
                      width: "32px",
                      height: "32px",
                      borderRadius: "50%",
                      background: "#f3f4f6",
                      border: "none",
                      cursor: "pointer",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      fontSize: "18px",
                      color: "#6b7280",
                      transition: "all 0.2s",
                    }}
                    onMouseOver={(e) => {
                      e.currentTarget.style.background = "#dc2626";
                      e.currentTarget.style.color = "white";
                    }}
                    onMouseOut={(e) => {
                      e.currentTarget.style.background = "#f3f4f6";
                      e.currentTarget.style.color = "#6b7280";
                    }}
                  >
                    ✕
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      };

      // Hide loading screen and render app
      const loadingScreen = document.getElementById("loadingScreen");
      if (loadingScreen) {
        loadingScreen.style.display = "none";
      }

      ReactDOM.render(
        <ErrorBoundary>
          <KasKelasApp />
        </ErrorBoundary>,
        document.getElementById("root")
      );
    </script>
  </body>
</html>
